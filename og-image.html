<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
    }
    .og-card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .og-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .og-card::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .content {
      position: relative;
      z-index: 10;
    }
    .logo {
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    .name {
      font-size: 96px;
      font-weight: 800;
      color: #f8fafc;
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #38bdf8 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 28px;
      color: #cbd5e1;
      font-weight: 500;
      margin-bottom: 40px;
    }
    .tech-stack {
      display: flex;
      gap: 16px;
      margin-bottom: 50px;
    }
    .tech-badge {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 20px;
      color: #e2e8f0;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
    .url {
      font-size: 24px;
      color: #60a5fa;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .url::before {
      content: '🌐';
      font-size: 28px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="og-card">
    <div class="content">
      <div class="logo">Portfolio</div>
      <div class="name">GUNADEEP</div>
      <div class="subtitle">11th Class Student & Front-End Developer</div>
      <div class="tech-stack">
        <div class="tech-badge">HTML</div>
        <div class="tech-badge">CSS</div>
        <div class="tech-badge">JavaScript</div>
        <div class="tech-badge">Node.js</div>
      </div>
      <div class="url">11th-gunadeep.netlify.app</div>
    </div>
  </div>
</body>
</html>
